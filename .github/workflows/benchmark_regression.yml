name: benchmark_regression

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  fast-speculative-tests:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build native extensions
        run: python setup.py build_ext --inplace

      - name: Synthetic preq2 / preq correctness
        run: |
          pytest benchmarks/test_preq2_correctness.py benchmarks/test_preq_correctness.py -q

      - name: PLD lossless (lookup + serial verify)
        run: pytest benchmarks/test_pld_lossless.py -q -k "lookup or serial"

      - name: UnifiedEngine KV / skip-mask tests
        run: |
          pytest tests/test_unified_kv_snapshot.py tests/test_unified_kv_truncate.py `
            tests/test_skip_mask_forward.py -q
        continue-on-error: true

      - name: AHSD lossless (fast, 2 tokens)
        env:
          ASDSL_TEST_DECODE_TOKENS: "2"
          ASDSL_IGNORE_EOS: "1"
        run: pytest tests/test_ahsd_lossless.py -q
        continue-on-error: true

      - name: Speculative unit tests (no weights)
        run: |
          pytest tests/test_speculative.py tests/test_ahsd_acceptance.py -q

      - name: Regression smoke (if scripts exist)
        run: |
          if (Test-Path scripts/run_full_benchmark.py) {
            python scripts/run_full_benchmark.py --max-new-tokens 2
          }
          if (Test-Path scripts/check_regression.py) {
            python scripts/check_regression.py
          }
        continue-on-error: true
