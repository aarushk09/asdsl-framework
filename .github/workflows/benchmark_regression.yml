name: ASDSL Performance Regression Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy torch transformers safetensors pybind11 psutil pytest

    - name: Build native kernels
      run: |
        python setup.py build_ext --inplace

    - name: Run logic tests
      run: |
        python -m pytest tests/test_lut_gemv_correctness.py -v

    - name: Run performance smoke test
      run: |
        # Use a small number of tokens for CI speed, but enough to check dispatch
        python scripts/run_full_benchmark.py --max-new-tokens 2 --emit-regression-json regression.json

    - name: Check for regressions
      run: |
        python scripts/check_regression.py regression.json benchmark_baseline.json
