name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build native extensions
        run: python setup.py build_ext --inplace

      - name: Verify native imports
        run: |
          python -c "import asdsl.kernels._native_unified, asdsl.kernels._native_gemv; print('native ok')"

      - name: Synthetic correctness (fast)
        run: |
          pytest benchmarks/test_preq2_correctness.py benchmarks/test_preq_correctness.py `
            benchmarks/test_lmhead_preq2_correctness.py -q

      - name: PLD unit + lossless (weights required)
        env:
          ASDSL_IGNORE_EOS: "1"
        run: pytest benchmarks/test_pld_lossless.py -q -k "lookup or serial"
        continue-on-error: true

      - name: Kernel preflight smoke
        run: python benchmarks/kernel_preflight.py

      - name: Speculative unit tests (no weights)
        run: pytest tests/test_speculative.py tests/test_ahsd_acceptance.py -q
